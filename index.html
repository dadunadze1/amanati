<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Courier FLAGS PRO</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="map"></div>

  <section id="authBox" class="auth-screen">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🚚</div>
        <div>
          <h1>Courier FLAGS PRO</h1>
          <p>Admin / Courier login</p>
        </div>
      </div>

      <div class="auth-tabs">
        <button type="button" onclick="login()">შესვლა</button>
        <button type="button" onclick="register()">რეგისტრაცია</button>
      </div>

      <input id="email" type="email" placeholder="Email" autocomplete="email" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />

      <button class="main-auth-btn" type="button" onclick="login()">შესვლა</button>

      <p id="authMessage" class="auth-message"></p>

      <div class="firebase-note">
        სატესტო Firebase: შექმენი user Firebase Authentication-ში ან გამოიყენე რეგისტრაცია.
      </div>
    </div>
  </section>

  <button id="menuBtn" class="menu-btn hidden" onclick="toggleMenu()">☰</button>

  <aside id="sidebar" class="sidebar">
    <h2>მენიუ</h2>

    <button onclick="showAdminPanel()">ადმინის პანელი</button>
    <button onclick="showCourierPanel()">კურიერის პანელი</button>
    <button onclick="openClients()">კლიენტების ბაზა</button>
    <button onclick="openAnalytics()">ანალიტიკა</button>
    <button onclick="openReports()">ანგარიშები</button>
    <button onclick="logout()">გასვლა</button>
  </aside>

  <div id="panel" class="panel hidden">
    <button class="close-panel" onclick="closePanel()">×</button>
    <div id="panelContent"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
