<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1980 Pixel Slot</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>
<div id="game">
  <div class="screenFlash" id="screenFlash"></div>
  <div class="title">1980 PIXEL SLOT</div>

  <img id="bossPopup" src="boss.png">

  <div class="main-wrap">

    <div class="slot-machine">
      <div class="grid">
        <div class="win-line line-top" id="lineTop"></div>
        <div class="win-line line-mid" id="lineMid"></div>
        <div class="win-line line-bot" id="lineBot"></div>

        <div class="cell"><div class="reel" id="r0"></div></div>
        <div class="cell"><div class="reel" id="r1"></div></div>
        <div class="cell"><div class="reel" id="r2"></div></div>

        <div class="cell"><div class="reel" id="r3"></div></div>
        <div class="cell"><div class="reel" id="r4"></div></div>
        <div class="cell"><div class="reel" id="r5"></div></div>

        <div class="cell"><div class="reel" id="r6"></div></div>
        <div class="cell"><div class="reel" id="r7"></div></div>
        <div class="cell"><div class="reel" id="r8"></div></div>
      </div>

      <div class="controls">
        <button class="modeBtn active" id="oneLineBtn" onclick="setMode(1)">1 LINE</button>
        <button class="modeBtn" id="threeLineBtn" onclick="setMode(3)">3 LINES</button>
      </div>

      <button id="spinBtn" onclick="spin()">SPIN</button>
    </div>

    <div class="side-panel">
      <h2>ლარის პანელი</h2>

      <div class="box">
        <div class="label">ბალანსი</div>
        <div class="value" id="balance">1000₾</div>
      </div>

      <div class="box">
        <div class="label">მაქს ბალანსი</div>
        <div class="value" id="maxBalance">1000₾</div>
      </div>

      <div class="box">
        <div class="label">RTP</div>
        <div class="value" id="rtp">0%</div>
      </div>

      <div class="box">
        <div class="label">BET</div>
        <input id="betInput" type="number" min="1" value="10" oninput="customBet()">

        <div class="bet-buttons">
          <button class="betBtn active" id="bet10" onclick="setBet(10)">10₾</button>
          <button class="betBtn" id="bet20" onclick="setBet(20)">20₾</button>
          <button class="betBtn" id="bet30" onclick="setBet(30)">30₾</button>
          <button class="betBtn" id="bet40" onclick="setBet(40)">40₾</button>
        </div>
      </div>

      <div class="box">
        <button id="resetBtn" onclick="resetGame()">RESET</button>
      </div>

      <div id="message">READY</div>
    </div>

  </div>
</div>
</body>
</html>
