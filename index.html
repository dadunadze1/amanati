<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Courier FLAGS PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    *{box-sizing:border-box}
    body{margin:0;overflow:hidden;font-family:Arial;background:#0f172a}
    #map{width:100vw;height:100vh}

    #authBox{
      position:fixed;inset:0;
      background:rgba(15,23,42,.88);
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card{
      width:330px;
      background:#111827;
      padding:22px;
      border-radius:18px;
      color:white;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
    }

    .card h1{font-size:24px;margin:0 0 5px}
    .card p{margin:0 0 15px;color:#cbd5e1}

    input,select,button{
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:10px;
      border:1px solid #334155;
      font-size:14px;
    }

    input,select{
      background:#0f172a;
      color:white;
    }

    button{
      border:0;
      background:#22c55e;
      color:#052e16;
      font-weight:bold;
      cursor:pointer;
    }

    .blue{background:#38bdf8;color:#082f49}
    .red{background:#ef4444;color:white}
    .dark{background:#1e293b;color:white}

    #menuBtn{
      position:fixed;
      top:15px;
      right:15px;
      z-index:3000;
      width:auto;
      display:none;
    }

    #sidebar{
      position:fixed;
      top:0;
      right:-330px;
      width:300px;
      height:100vh;
      background:#111827;
      color:white;
      z-index:2500;
      padding:20px;
      transition:.3s;
      overflow:auto;
    }

    #sidebar.open{right:0}

    #panel{
      position:fixed;
      left:20px;
      bottom:20px;
      width:360px;
      max-height:80vh;
      overflow:auto;
      background:white;
      color:#111;
      z-index:2600;
      padding:16px;
      border-radius:16px;
      display:none;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }

    .courier-item{
      border:1px solid #ddd;
      padding:10px;
      border-radius:10px;
      margin-bottom:8px;
      background:#f8fafc;
    }

    .small{font-size:13px;color:#475569}
  </style>
</head>

<body>

<div id="map"></div>

<section id="authBox">
  <div class="card">
    <h1>🚚 Courier FLAGS PRO</h1>
    <p>Admin / Courier login</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">შესვლა</button>
    <button class="blue" onclick="registerCourier()">რეგისტრაცია კურიერად</button>

    <p id="authMessage" class="small"></p>
  </div>
</section>

<button id="menuBtn" class="dark" onclick="toggleMenu()">☰</button>

<aside id="sidebar">
  <h2>მენიუ</h2>

  <button onclick="openAdminPanel()">ადმინის პანელი</button>
  <button onclick="openAddCourier()">➕ კურიერის დამატება</button>
  <button onclick="loadCouriers()">📋 კურიერების სია</button>
  <button onclick="openAnalytics()">ანალიტიკა</button>
  <button class="red" onclick="logout()">გასვლა</button>
</aside>

<div id="panel"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map("map").setView([41.7151, 44.8271], 12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
  }).addTo(map);

  window.toggleMenu = function(){
    document.getElementById("sidebar").classList.toggle("open");
  };

  window.showPanel = function(html){
    const panel = document.getElementById("panel");
    panel.innerHTML = html;
    panel.style.display = "block";
  };

  window.closePanel = function(){
    document.getElementById("panel").style.display = "none";
  };
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    addDoc,
    collection,
    getDocs,
    serverTimestamp,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBF421H4mkNB9Ve_uJ8Ph6z4LrbxzKlrC4",
    authDomain: "amanatebi123-43963.firebaseapp.com",
    projectId: "amanatebi123-43963",
    storageBucket: "amanatebi123-43963.firebasestorage.app",
    messagingSenderId: "882036563594",
    appId: "1:882036563594:web:c800b0f2bb6977a441d773"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUserRole = null;

  function showApp(){
    document.getElementById("authBox").style.display = "none";
    document.getElementById("menuBtn").style.display = "block";
  }

  function showLogin(){
    document.getElementById("authBox").style.display = "flex";
    document.getElementById("menuBtn").style.display = "none";
  }

  async function checkRole(user){
    const snap = await getDoc(doc(db, "users", user.uid));

    if (!snap.exists()) {
      alert("ეს user Firestore users-ში არ არსებობს");
      showLogin();
      return;
    }

    const data = snap.data();
    currentUserRole = data.role;

    showApp();

    if (data.role === "admin") {
      console.log("ADMIN MODE");
    } else {
      console.log("COURIER MODE");
    }
  }

  window.login = async function(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try{
      const cred = await signInWithEmailAndPassword(auth, email, password);
      await checkRole(cred.user);
    }catch(e){
      document.getElementById("authMessage").textContent = e.message;
    }
  };

  window.registerCourier = async function(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try{
      const cred = await createUserWithEmailAndPassword(auth, email, password);

      await setDoc(doc(db, "users", cred.user.uid), {
        email,
        role: "courier",
        createdAt: serverTimestamp()
      });

      alert("კურიერი დარეგისტრირდა ✅");
      await checkRole(cred.user);
    }catch(e){
      document.getElementById("authMessage").textContent = e.message;
    }
  };

  window.logout = async function(){
    await signOut(auth);
    location.reload();
  };

  window.openAdminPanel = function(){
    if(currentUserRole !== "admin"){
      alert("ეს ფუნქცია მხოლოდ ადმინისთვისაა");
      return;
    }

    showPanel(`
      <button onclick="closePanel()">× დახურვა</button>
      <h2>ადმინის პანელი</h2>
      <p>აქედან მართავ კურიერებს, შეკვეთებს და ანალიტიკას.</p>
    `);
  };

  window.openAddCourier = function(){
    if(currentUserRole !== "admin"){
      alert("მხოლოდ ადმინს შეუძლია კურიერის დამატება");
      return;
    }

    showPanel(`
      <button onclick="closePanel()">× დახურვა</button>
      <h2>➕ კურიერის დამატება</h2>

      <input id="cName" placeholder="სახელი და გვარი">
      <input id="cPhone" placeholder="ტელეფონი">
      <input id="cEmail" placeholder="Email">
      <input id="cZone" placeholder="ზონა მაგალითად: vake">

      <button onclick="saveCourier()">შენახვა</button>
    `);
  };

  window.saveCourier = async function(){
    const name = document.getElementById("cName").value.trim();
    const phone = document.getElementById("cPhone").value.trim();
    const email = document.getElementById("cEmail").value.trim();
    const zone = document.getElementById("cZone").value.trim();

    if(!name || !phone || !email || !zone){
      alert("ყველა ველი შეავსე");
      return;
    }

    await addDoc(collection(db, "couriers"), {
      name,
      phone,
      email,
      zone,
      active: true,
      createdAt: serverTimestamp()
    });

    alert("კურიერი დაემატა ✅");
    loadCouriers();
  };

  window.loadCouriers = async function(){
    if(currentUserRole !== "admin"){
      alert("მხოლოდ ადმინს შეუძლია კურიერების ნახვა");
      return;
    }

    const q = query(collection(db, "couriers"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);

    let html = `
      <button onclick="closePanel()">× დახურვა</button>
      <h2>📋 კურიერების სია</h2>
    `;

    if(snap.empty){
      html += `<p>კურიერები ჯერ არ არის დამატებული.</p>`;
    }

    snap.forEach(docItem => {
      const c = docItem.data();
      html += `
        <div class="courier-item">
          <b>${c.name || "-"}</b><br>
          📞 ${c.phone || "-"}<br>
          ✉️ ${c.email || "-"}<br>
          📍 ზონა: ${c.zone || "-"}<br>
          აქტიური: ${c.active ? "კი" : "არა"}
        </div>
      `;
    });

    showPanel(html);
  };

  window.openAnalytics = function(){
    showPanel(`
      <button onclick="closePanel()">× დახურვა</button>
      <h2>ანალიტიკა</h2>
      <p>შემდეგ ეტაპზე აქ დავამატებთ შეკვეთების რაოდენობას, კურიერის ეფექტიანობას და დღიურ სტატისტიკას.</p>
    `);
  };

  onAuthStateChanged(auth, async (user) => {
    if(user){
      await checkRole(user);
    }else{
      showLogin();
    }
  });
</script>

</body>
</html>
