<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>80s Pixel Slot</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#050008;
  font-family:monospace;
  color:white;
  overflow:hidden;
}

#game{
  width:100vw;
  height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.65)),
    url("bg.png") center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
}

.title{
  font-size:34px;
  color:#ff3bd5;
  text-shadow:
    0 0 8px #ff00cc,
    0 0 18px #ff00cc,
    0 0 30px #00ffff;
  margin-bottom:28px;
  letter-spacing:3px;
}

.slot-machine{
  padding:28px;
  border:5px solid #ff00cc;
  background:rgba(5,5,15,.88);
  box-shadow:
    0 0 18px #ff00cc,
    inset 0 0 25px #00ffff;
  border-radius:18px;
}

.slot-container{
  display:flex;
  gap:18px;
}

.slot{
  width:145px;
  height:145px;
  border:4px solid #00ffff;
  background:#080812;
  box-shadow:
    0 0 18px #00ffff,
    inset 0 0 20px #ff00cc;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slot img{
  width:100%;
  height:100%;
  object-fit:cover;
  image-rendering:pixelated;
}

.spinning img{
  animation:spinBlur .12s linear infinite;
}

@keyframes spinBlur{
  0%{ transform:translateY(-40px) scale(1.08); filter:blur(1px) brightness(1.5); }
  50%{ transform:translateY(40px) scale(1.08); filter:blur(2px) brightness(2); }
  100%{ transform:translateY(-40px) scale(1.08); filter:blur(1px) brightness(1.5); }
}

button{
  margin-top:24px;
  padding:16px 44px;
  border:none;
  border-radius:10px;
  background:#00ffff;
  color:#050008;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:
    0 0 12px #00ffff,
    0 0 28px #00ffff;
}

button:active{
  transform:scale(.96);
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

#score,
#highScore,
#message{
  margin-top:14px;
  font-size:22px;
  text-shadow:0 0 12px #00ffff;
}

#message{
  color:#ff3bd5;
  min-height:28px;
  text-shadow:
    0 0 10px #ff00cc,
    0 0 20px #ff00cc;
}

.winFlash{
  animation:winFlash .65s ease-in-out 3;
}

@keyframes winFlash{
  0%{
    box-shadow:
      0 0 18px #ff00cc,
      inset 0 0 25px #00ffff;
  }
  50%{
    box-shadow:
      0 0 45px #fff,
      0 0 80px #ff00cc,
      0 0 120px #00ffff,
      inset 0 0 45px #fff;
    transform:scale(1.03);
  }
  100%{
    box-shadow:
      0 0 18px #ff00cc,
      inset 0 0 25px #00ffff;
  }
}

.screenFlash{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:rgba(255,0,220,.22);
  opacity:0;
}

.screenFlash.active{
  animation:screenFlash .45s ease-out;
}

@keyframes screenFlash{
  0%{ opacity:0; }
  35%{ opacity:1; }
  100%{ opacity:0; }
}

@media(max-width:600px){
  .title{ font-size:24px; }
  .slot-machine{ padding:18px; }
  .slot{ width:95px; height:95px; }
  button{ font-size:18px; }
}
</style>
</head>

<body>

<div id="game">
  <div class="screenFlash" id="screenFlash"></div>

  <div class="title">1980 PIXEL SLOT</div>

  <div class="slot-machine" id="machine">
    <div class="slot-container">
      <div class="slot" id="slot1"><img id="s1" src="npc1.png"></div>
      <div class="slot" id="slot2"><img id="s2" src="npc2.png"></div>
      <div class="slot" id="slot3"><img id="s3" src="npc3.png"></div>
    </div>

    <button id="spinBtn" onclick="spin()">SPIN</button>

    <div id="score">Score: 0</div>
    <div id="highScore">High Score: 0</div>
    <div id="message"></div>
  </div>
</div>

<script>
const images = ["npc1.png", "npc2.png", "npc3.png", "npc4.png"];

const points = {
  "npc1.png": 100,
  "npc2.png": 200,
  "npc3.png": 300,
  "npc4.png": 400
};

let score = Number(localStorage.getItem("slotScore")) || 0;
let highScore = Number(localStorage.getItem("slotHighScore")) || 0;
let spinning = false;

const s1 = document.getElementById("s1");
const s2 = document.getElementById("s2");
const s3 = document.getElementById("s3");

const slot1 = document.getElementById("slot1");
const slot2 = document.getElementById("slot2");
const slot3 = document.getElementById("slot3");

const scoreBox = document.getElementById("score");
const highScoreBox = document.getElementById("highScore");
const messageBox = document.getElementById("message");
const machine = document.getElementById("machine");
const spinBtn = document.getElementById("spinBtn");
const screenFlash = document.getElementById("screenFlash");

updateScore();

function randomImage(){
  return images[Math.floor(Math.random() * images.length)];
}

function spin(){
  if(spinning) return;

  spinning = true;
  spinBtn.disabled = true;
  messageBox.innerText = "";

  playSpinSound();

  slot1.classList.add("spinning");
  slot2.classList.add("spinning");
  slot3.classList.add("spinning");

  const interval1 = setInterval(() => s1.src = randomImage(), 80);
  const interval2 = setInterval(() => s2.src = randomImage(), 80);
  const interval3 = setInterval(() => s3.src = randomImage(), 80);

  let r1 = randomImage();
  let r2 = randomImage();
  let r3 = randomImage();

  setTimeout(() => {
    clearInterval(interval1);
    s1.src = r1;
    slot1.classList.remove("spinning");
    playTickSound();
  }, 900);

  setTimeout(() => {
    clearInterval(interval2);
    s2.src = r2;
    slot2.classList.remove("spinning");
    playTickSound();
  }, 1250);

  setTimeout(() => {
    clearInterval(interval3);
    s3.src = r3;
    slot3.classList.remove("spinning");
    playTickSound();

    checkWin(r1, r2, r3);

    spinning = false;
    spinBtn.disabled = false;
  }, 1600);
}

function checkWin(r1, r2, r3){
  if(r1 === r2 && r2 === r3){
    const winPoints = points[r1];

    score += winPoints;

    if(score > highScore){
      highScore = score;
      localStorage.setItem("slotHighScore", highScore);
    }

    localStorage.setItem("slotScore", score);

    messageBox.innerText = "WIN +" + winPoints + " POINTS!";
    updateScore();
    winEffect();
    playWinSound();
  } else {
    messageBox.innerText = "NO WIN";
    localStorage.setItem("slotScore", score);
    updateScore();
  }
}

function updateScore(){
  scoreBox.innerText = "Score: " + score;
  highScoreBox.innerText = "High Score: " + highScore;
}

function winEffect(){
  machine.classList.remove("winFlash");
  screenFlash.classList.remove("active");

  void machine.offsetWidth;
  void screenFlash.offsetWidth;

  machine.classList.add("winFlash");
  screenFlash.classList.add("active");
}

function playTone(freq, duration, type = "square", volume = 0.08){
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const ctx = new AudioContext();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = type;
  osc.frequency.value = freq;

  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();

  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.stop(ctx.currentTime + duration);
}

function playSpinSound(){
  playTone(180, .12, "square", .05);
  setTimeout(() => playTone(240, .12, "square", .05), 120);
  setTimeout(() => playTone(320, .12, "square", .05), 240);
  setTimeout(() => playTone(420, .12, "square", .05), 360);
}

function playTickSound(){
  playTone(520, .07, "square", .06);
}

function playWinSound(){
  playTone(520, .12, "square", .08);
  setTimeout(() => playTone(680, .12, "square", .08), 130);
  setTimeout(() => playTone(860, .16, "square", .08), 260);
  setTimeout(() => playTone(1100, .22, "square", .08), 420);
}
</script>

</body>
</html>
