<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>კურიერის სისტემა - თბილისი</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #f5f7fb; padding: 16px; }
        .app { max-width: 1400px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .tabs { display: none; background: #ffffff; gap: 6px; padding: 12px 24px 0 24px; border-bottom: 1px solid #eef2f6; }
        .tabs.visible { display: flex; }
        .tab-btn { background: transparent; border: none; padding: 10px 20px; font-size: 0.95rem; font-weight: 500; color: #5a6874; cursor: pointer; border-radius: 30px; transition: 0.2s; }
        .tab-btn.active { background: #eef2ff; color: #1f2b3e; }
        .tab-content { display: none; padding: 28px; }
        .tab-content.active { display: block; }
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 70vh; }
        .auth-card { background: white; border-radius: 28px; box-shadow: 0 12px 30px rgba(0,0,0,0.05); padding: 36px 32px; width: 100%; max-width: 440px; }
        .auth-card h2 { font-size: 26px; font-weight: 600; margin-bottom: 28px; color: #1e2a3a; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #334155; }
        .input-group input { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 40px; font-size: 15px; background: #ffffff; }
        .input-group input:focus { outline: none; border-color: #8b9eb0; }
        .error-message { color: #c2410c; font-size: 12px; margin-top: 4px; margin-left: 12px; }
        .btn-primary { width: 100%; background: #1e2a3a; color: white; border: none; padding: 12px; border-radius: 40px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
        .btn-primary:hover { background: #0f172a; }
        .auth-footer { text-align: center; margin-top: 22px; font-size: 13px; }
        .auth-link { color: #1e2a3a; font-weight: 500; background: none; border: none; cursor: pointer; }
        .card { background: #ffffff; border-radius: 24px; padding: 20px; margin-bottom: 24px; border: 1px solid #edf2f7; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .map-container { height: 380px; border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        #map, #adminMap { height: 100%; width: 100%; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 16px; }
        .stat-card { background: #f8fafc; border-radius: 20px; padding: 16px; flex: 1; min-width: 140px; text-align: center; border: 1px solid #eef2f6; }
        button, .btn { background: #eef2ff; color: #1f2b3e; border: none; padding: 8px 16px; border-radius: 32px; font-weight: 500; cursor: pointer; font-size: 0.85rem; }
        button.danger { background: #fff1f0; color: #b91c1c; }
        button.success { background: #e6f7ec; color: #15803d; }
        input, select, textarea { width: 100%; padding: 10px 14px; margin: 6px 0; border: 1px solid #cfdfed; border-radius: 28px; font-size: 14px; }
        .order-item { background: #ffffff; border-radius: 20px; padding: 14px; margin-bottom: 12px; border-left: 4px solid; display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; }
        .delivered { border-left-color: #2b9348; }
        .failed { border-left-color: #e85d04; }
        .pending { border-left-color: #ffb703; }
        .admin-submenu { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; padding-bottom: 8px; border-bottom: 1px solid #eef2f6; }
        .admin-submenu button { background: #f1f5f9; color: #334155; }
        .admin-submenu button.active-sub { background: #e2e8f0; color: #0f172a; font-weight: 600; }
        .admin-section { display: none; }
        .admin-section.active-section { display: block; }
        .courier-row, .request-row, .order-row-admin { background: #fafcff; border-radius: 20px; padding: 14px; margin-bottom: 12px; border: 1px solid #eef2f6; }
        .request-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .order-row-admin { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .search-box-admin { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .courier-edit-fields { margin-top: 12px; background: #f1f5f9; padding: 12px; border-radius: 20px; display: none; grid-template-columns: 1fr 1fr; gap: 10px; }
        .courier-edit-fields.active-edit { display: grid; }
        .edit-btn-small { background: #e2e8f0; font-size: 0.75rem; padding: 4px 12px; margin: 2px; }
        @media (max-width: 700px) { .tab-content { padding: 16px; } .auth-card { padding: 24px 20px; } }
    </style>
</head>
<body>
<div class="app">
    <div class="tabs" id="tabsBar">
        <button class="tab-btn" data-tab="loginTab">შესვლა</button>
        <button class="tab-btn" data-tab="courierTab">კურიერის პანელი</button>
        <button class="tab-btn" data-tab="adminTab">ადმინ პანელი</button>
    </div>

    <div id="loginTab" class="tab-content active">
        <div class="auth-container">
            <div class="auth-card">
                <div id="loginFormWrapper">
                    <h2>შესვლა</h2>
                    <div class="input-group"><label>ელფოსტა</label><input type="text" id="loginEmail" placeholder="admin ან courier@test.com" value="admin"></div>
                    <div class="input-group"><label>პაროლი</label><input type="password" id="loginPass" placeholder="********"></div>
                    <button class="btn-primary" id="doLoginBtn">შესვლა</button>
                    <div class="auth-footer"><button class="auth-link" id="showRegisterLink">რეგისტრაცია</button></div>
                    <div id="loginGeneralError" class="error-message" style="text-align:center;display:none;">მონაცემები არასწორია</div>
                </div>
                <div id="registerFormWrapper" style="display:none;">
                    <h2>რეგისტრაცია</h2>
                    <div class="input-group"><label>სახელი გვარი</label><input type="text" id="regName"></div>
                    <div class="input-group"><label>ელფოსტა</label><input type="email" id="regEmail"></div>
                    <div class="input-group"><label>მობილური</label><input type="tel" id="regPhone"></div>
                    <div class="input-group"><label>საბანკო რეკვიზიტები</label><input type="text" id="regBank"></div>
                    <div class="input-group"><label>პაროლი</label><input type="password" id="regPass"></div>
                    <button class="btn-primary" id="doRegisterBtn">რეგისტრაცია</button>
                    <div class="auth-footer"><button class="auth-link" id="showLoginLink">← დაბრუნდი</button></div>
                </div>
            </div>
        </div>
    </div>

    <div id="courierTab" class="tab-content">
        <div class="card"><div style="display:flex;justify-content:space-between;"><h2>კურიერის დაფა</h2><button id="logoutBtn">გასვლა</button></div><div id="courierProfile"></div></div>
        <div class="card"><h3>რუკა</h3><div class="map-container"><div id="map"></div></div><div id="ordersListOnMap"></div></div>
        <div class="card"><h3>დღის სტატისტიკა</h3><div id="dailyStats" class="flex-row"></div><h3>თვის სტატისტიკა</h3><div id="monthlyStats" class="flex-row"></div></div>
    </div>

    <div id="adminTab" class="tab-content">
        <div class="card">
            <h2>ადმინისტრატორი</h2><button id="adminLogout">გასვლა</button><hr>
            <div class="admin-submenu">
                <button id="adminMainBtn" class="active-sub">📦 ამანათის დამატება</button>
                <button id="adminOrdersListBtn">📋 ამანათები</button>
                <button id="adminCouriersBtn">👥 კურიერები</button>
                <button id="adminStatsBtn">📊 სტატისტიკა</button>
                <button id="adminRequestsBtn">📝 მოთხოვნები</button>
            </div>
            <div id="adminMainSection" class="admin-section active-section">
                <h3>ახალი ამანათი</h3>
                <div><input type="text" id="searchAddress" placeholder="მისამართის ძებნა"><button id="searchBtn">ძებნა</button></div>
                <div class="map-container" style="height:320px;"><div id="adminMap"></div></div>
                <input type="text" id="newOrderAddress" placeholder="მისამართი">
                <input type="text" id="clientName" placeholder="მომხმარებლის სახელი">
                <input type="tel" id="clientPhone" placeholder="მობილური">
                <select id="newOrderCourierAssign"></select>
                <button id="createOrderBtn">შექმნა</button>
            </div>
            <div id="adminOrdersListSection" class="admin-section">
                <h3>ამანათები</h3>
                <div><input type="text" id="searchOrderByPhone" placeholder="🔍 ძებნა ნომრით"><button id="searchOrderPhoneBtn">ძებნა</button><button id="resetOrderListBtn">გასუფთავება</button></div>
                <div id="adminOrdersContainer"></div>
            </div>
            <div id="adminCouriersSection" class="admin-section">
                <h3>კურიერები</h3>
                <div id="couriersList"></div>
            </div>
            <div id="adminStatsSection" class="admin-section"><h3>სტატისტიკა</h3><div id="adminDailyStats" class="flex-row"></div></div>
            <div id="adminRequestsSection" class="admin-section"><h3>მოთხოვნები</h3><div id="requestsList"></div></div>
        </div>
    </div>
</div>

<script>
let users = [], orders = [], currentUser = null;
let adminMap = null, adminMarker = null, selectedLat = null, selectedLng = null;
let courierMap = null, courierMarkersLayer = null;

function saveData() {
    localStorage.setItem('courier_users', JSON.stringify(users));
    localStorage.setItem('courier_orders', JSON.stringify(orders));
    localStorage.setItem('courier_session', JSON.stringify(currentUser));
}

function loadData() {
    let su = localStorage.getItem('courier_users');
    if(su) users = JSON.parse(su);
    else users = [
        {id:1, name:"ნიკა კურიერი", email:"courier@test.com", phone:"599111222", bank:"GE00TB000", password:"123", role:"courier", status:"active"},
        {id:2, name:"ადმინი", email:"admin", phone:"577000111", bank:"N/A", password:"123", role:"admin", status:"active"}
    ];
    let so = localStorage.getItem('courier_orders');
    if(so) orders = JSON.parse(so);
    else orders = [
        {id:101, address:"რუსთაველის გამზირი 5", lat:41.699, lng:44.7945, status:"pending", courierId:1, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(), clientName:"ანა", clientPhone:"598123456"},
        {id:102, address:"ვაჟა-ფშაველას 33", lat:41.7181, lng:44.7519, status:"delivered", courierId:1, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(), clientName:"გიორგი", clientPhone:"599876543"}
    ];
    let ss = localStorage.getItem('courier_session');
    currentUser = ss ? JSON.parse(ss) : null;
}
loadData();

function persist() { saveData(); renderAll(); }

function getActiveCouriers() { return users.filter(u => u.role === 'courier' && u.status === 'active'); }
function getCourierNameById(id) { let c = users.find(u => u.id === id); return c ? c.name : "უცნობი"; }
function updateOrderStatus(id, st) { let o = orders.find(x => x.id == id); if(o) { o.status = st; o.updatedAt = new Date().toISOString(); persist(); } }
window.updateOrderStatus = updateOrderStatus;

function updateCourierField(uid, field, val) {
    let c = users.find(u => u.id === uid && u.role === 'courier');
    if(c) { c[field] = val; persist(); alert("განახლდა"); }
}
function approveRegistration(uid) { let u = users.find(x => x.id === uid); if(u && u.status === 'pending') { u.status = 'active'; u.role = 'courier'; persist(); } }
function rejectRegistration(uid) { users = users.filter(x => x.id !== uid); persist(); }

function getDailyStats(arr) {
    let today = new Date().toDateString();
    let tod = arr.filter(o => new Date(o.updatedAt).toDateString() === today || new Date(o.createdAt).toDateString() === today);
    return { delivered: tod.filter(o=>o.status==='delivered').length, failed: tod.filter(o=>o.status==='failed').length, pending: tod.filter(o=>o.status==='pending').length, total: tod.length };
}
function getMonthlyStats(arr) {
    let now = new Date();
    let m = arr.filter(o => new Date(o.updatedAt).getMonth() === now.getMonth() && new Date(o.updatedAt).getFullYear() === now.getFullYear());
    return { delivered: m.filter(o=>o.status==='delivered').length, failed: m.filter(o=>o.status==='failed').length, total: m.length };
}

function initCourierMap() {
    if(courierMap) courierMap.remove();
    let d = document.getElementById('map');
    if(!d) return;
    courierMap = L.map('map').setView([41.7151,44.8271],13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(courierMap);
    renderCourierMarkers();
}
function renderCourierMarkers() {
    if(!courierMap) return;
    if(courierMarkersLayer) courierMap.removeLayer(courierMarkersLayer);
    courierMarkersLayer = L.layerGroup().addTo(courierMap);
    if(!currentUser || currentUser.role !== 'courier') return;
    let list = orders.filter(o => o.courierId === currentUser.id);
    let div = document.getElementById('ordersListOnMap');
    if(div) div.innerHTML = '<strong>თქვენი ამანათები:</strong><br>';
    for(let o of list) {
        L.marker([o.lat, o.lng]).addTo(courierMarkersLayer).bindPopup('<b>'+o.address+'</b><br>'+o.clientName+'<br>'+o.status);
        if(div) div.innerHTML += '<div class="order-item '+o.status+'"><div>'+o.address+'<br>'+o.clientName+' '+o.clientPhone+'</div><div><button class="success" onclick="updateOrderStatus('+o.id+',\'delivered\')">მივიტანე</button><button class="danger" onclick="updateOrderStatus('+o.id+',\'failed\')">ვერ მივიტანე</button></div></div>';
    }
}
function renderCourierProfile() {
    if(!currentUser || currentUser.role !== 'courier') return;
    document.getElementById('courierProfile').innerHTML = '<h3>👤 პროფილი</h3><p>'+currentUser.name+'<br>'+currentUser.email+'<br>'+ (currentUser.phone||'') +'<br>'+ (currentUser.bank||'') +'</p>';
    let myOrders = orders.filter(o => o.courierId === currentUser.id);
    let d = getDailyStats(myOrders), m = getMonthlyStats(myOrders);
    document.getElementById('dailyStats').innerHTML = '<div class="stat-card">✅ მიტანილი: '+d.delivered+'</div><div class="stat-card">❌ ვერ: '+d.failed+'</div><div class="stat-card">⏳ მოსატანი: '+d.pending+'</div>';
    document.getElementById('monthlyStats').innerHTML = '<div class="stat-card">📆 თვის მიტანილი: '+m.delivered+'</div><div class="stat-card">❌ თვის ვერ: '+m.failed+'</div>';
    renderCourierMarkers();
}

function renderAdminOrders(phone) {
    let cont = document.getElementById('adminOrdersContainer');
    if(!cont) return;
    let filtered = [...orders];
    if(phone && phone.trim()) filtered = filtered.filter(o => o.clientPhone && o.clientPhone.includes(phone.trim()));
    if(!filtered.length) { cont.innerHTML = '<p>ვერ მოიძებნა</p>'; return; }
    let html = '<div><strong>სულ: '+filtered.length+'</strong></div>';
    for(let o of filtered) {
        html += '<div class="order-row-admin"><div><b>'+o.address+'</b><br>👤 '+o.clientName+' 📞 '+o.clientPhone+'<br>🚚 '+getCourierNameById(o.courierId)+'<br>სტატუსი: '+o.status+'</div><div><button class="success" onclick="updateOrderStatus('+o.id+',\'delivered\')">✅ ჩაბარებული</button> <button class="danger" onclick="updateOrderStatus('+o.id+',\'failed\')">❌ ვერ</button> <button onclick="updateOrderStatus('+o.id+',\'pending\')">⏳ მიმდინარე</button></div></div>';
    }
    cont.innerHTML = html;
}

function renderCouriersAdmin() {
    let cont = document.getElementById('couriersList');
    if(!cont) return;
    let couriers = getActiveCouriers();
    if(!couriers.length) { cont.innerHTML = '<p>კურიერები არ არიან</p>'; return; }
    let html = '';
    for(let c of couriers) {
        html += '<div class="courier-row"><div><strong>'+c.name+'</strong> ('+c.email+')<br>📞 '+ (c.phone||'-') +' 🏦 '+ (c.bank||'-') +'<br>🔒 პაროლი: '+c.password+'</div>';
        html += '<div><button class="edit-btn" data-id="'+c.id+'" data-field="name">📝 სახელი</button> <button class="edit-btn" data-id="'+c.id+'" data-field="email">✉️ მეილი</button> <button class="edit-btn" data-id="'+c.id+'" data-field="phone">📱 ნომერი</button> <button class="edit-btn" data-id="'+c.id+'" data-field="bank">🏦 ბანკი</button> <button class="edit-btn" data-id="'+c.id+'" data-field="password">🔑 პაროლი</button></div>';
        html += '<div id="edit-panel-'+c.id+'" class="courier-edit-fields"><input type="text" id="edit-val-'+c.id+'" placeholder="ახალი მნიშვნელობა"><button class="save-edit" data-id="'+c.id+'">შენახვა</button></div></div>';
    }
    cont.innerHTML = html;
    document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.onclick = (e) => {
            let id = parseInt(btn.getAttribute('data-id'));
            let field = btn.getAttribute('data-field');
            let panel = document.getElementById('edit-panel-'+id);
            document.querySelectorAll('.courier-edit-fields').forEach(p => p.classList.remove('active-edit'));
            panel.classList.add('active-edit');
            panel.querySelector('.save-edit').setAttribute('data-field', field);
        };
    });
    document.querySelectorAll('.save-edit').forEach(btn => {
        btn.onclick = (e) => {
            let id = parseInt(btn.getAttribute('data-id'));
            let field = btn.getAttribute('data-field');
            let val = document.getElementById('edit-val-'+id).value.trim();
            if(!val) return alert('შეიყვანეთ მნიშვნელობა');
            updateCourierField(id, field, val);
            document.getElementById('edit-panel-'+id).classList.remove('active-edit');
        };
    });
}

function renderAdminStats() {
    let today = new Date(); today.setHours(0,0,0,0);
    let todayOrders = orders.filter(o => new Date(o.createdAt) >= today);
    let delivered = orders.filter(o => o.status === 'delivered' && new Date(o.updatedAt) >= today).length;
    let failed = orders.filter(o => o.status === 'failed' && new Date(o.updatedAt) >= today).length;
    document.getElementById('adminDailyStats').innerHTML = '<div class="stat-card">📅 დღეს: '+todayOrders.length+'</div><div class="stat-card">✅ ჩაბარებული: '+delivered+'</div><div class="stat-card">❌ ვერ: '+failed+'</div><div class="stat-card">⏳ მიმდინარე: '+orders.filter(o=>o.status==='pending').length+'</div>';
}

function renderRequests() {
    let cont = document.getElementById('requestsList');
    if(!cont) return;
    let pending = users.filter(u => u.status === 'pending' && u.role !== 'admin');
    if(!pending.length) { cont.innerHTML = '<p>მოთხოვნები არ არის</p>'; return; }
    let html = '';
    for(let u of pending) {
        html += '<div class="request-row"><div><strong>'+u.name+'</strong><br>'+u.email+'<br>📞 '+(u.phone||'')+'<br>🏦 '+(u.bank||'')+'</div><div><button class="success" onclick="approveRegistration('+u.id+')">დადასტურება</button> <button class="danger" onclick="rejectRegistration('+u.id+')">უარყოფა</button></div></div>';
    }
    cont.innerHTML = html;
}

function initAdminMap() {
    if(adminMap) adminMap.remove();
    let d = document.getElementById('adminMap');
    if(!d) return;
    adminMap = L.map('adminMap').setView([41.7151,44.8271],13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(adminMap);
    adminMap.on('click', async (e) => {
        setAdminMarker(e.latlng.lat, e.latlng.lng);
        try {
            let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&accept-language=ka`);
            let data = await res.json();
            if(data.display_name) document.getElementById('newOrderAddress').value = data.display_name;
        } catch(err) {}
    });
}
function setAdminMarker(lat,lng) {
    if(adminMarker) adminMap.removeLayer(adminMarker);
    adminMarker = L.marker([lat,lng], {draggable:true}).addTo(adminMap);
    adminMarker.on('dragend', async (e) => {
        let p = e.target.getLatLng();
        selectedLat = p.lat; selectedLng = p.lng;
        let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.lat}&lon=${p.lng}&accept-language=ka`);
        let data = await res.json();
        if(data.display_name) document.getElementById('newOrderAddress').value = data.display_name;
    });
    selectedLat = lat; selectedLng = lng;
}
async function searchAddress() {
    let q = document.getElementById('searchAddress').value;
    if(!q) return;
    let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&accept-language=ka`;
    let res = await fetch(url);
    let data = await res.json();
    if(data.length) {
        let lat = parseFloat(data[0].lat), lon = parseFloat(data[0].lon);
        adminMap.setView([lat,lon],15);
        setAdminMarker(lat,lon);
        document.getElementById('newOrderAddress').value = data[0].display_name;
    } else alert('ვერ მოიძებნა');
}
function createOrder() {
    let addr = document.getElementById('newOrderAddress').value;
    let name = document.getElementById('clientName').value.trim();
    let phone = document.getElementById('clientPhone').value.trim();
    let cid = parseInt(document.getElementById('newOrderCourierAssign').value);
    if(!addr || !name || !phone) return alert('შეავსეთ ყველა ველი');
    if(!selectedLat || !selectedLng) return alert('მონიშნეთ რუკაზე');
    if(!cid) return alert('აირჩიეთ კურიერი');
    orders.push({ id: Date.now(), address: addr, lat: selectedLat, lng: selectedLng, status: "pending", courierId: cid, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(), clientName: name, clientPhone: phone });
    persist();
    selectedLat = null; selectedLng = null;
    if(adminMarker) adminMap.removeLayer(adminMarker);
    adminMarker = null;
    document.getElementById('newOrderAddress').value = '';
    document.getElementById('clientName').value = '';
    document.getElementById('clientPhone').value = '';
    alert('ამანათი დაემატა');
}

function refreshAdminPanel() {
    if(!currentUser || currentUser.role !== 'admin') return;
    let sel = document.getElementById('newOrderCourierAssign');
    if(sel) {
        let couriers = getActiveCouriers();
        sel.innerHTML = '<option value="">აირჩიე</option>' + couriers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }
    if(document.getElementById('adminOrdersListSection').classList.contains('active-section')) renderAdminOrders('');
    if(document.getElementById('adminCouriersSection').classList.contains('active-section')) renderCouriersAdmin();
    if(document.getElementById('adminStatsSection').classList.contains('active-section')) renderAdminStats();
    if(document.getElementById('adminRequestsSection').classList.contains('active-section')) renderRequests();
    if(adminMap) adminMap.invalidateSize();
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    if(tabId === 'courierTab' && currentUser?.role === 'courier') { initCourierMap(); renderCourierProfile(); }
    if(tabId === 'adminTab' && currentUser?.role === 'admin') { if(!adminMap) initAdminMap(); else adminMap.invalidateSize(); refreshAdminPanel(); }
}
function setAdminSection(sectionId) {
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active-section'));
    document.getElementById(sectionId).classList.add('active-section');
    if(sectionId === 'adminOrdersListSection') renderAdminOrders('');
    if(sectionId === 'adminCouriersSection') renderCouriersAdmin();
    if(sectionId === 'adminStatsSection') renderAdminStats();
    if(sectionId === 'adminRequestsSection') renderRequests();
    if(sectionId === 'adminMainSection' && adminMap) adminMap.invalidateSize();
}
function doLogin() {
    let email = document.getElementById('loginEmail').value;
    let pass = document.getElementById('loginPass').value;
    let user = users.find(u => (u.email === email) && u.password === pass && u.status === 'active');
    if(user) { currentUser = user; persist(); renderAll(); }
    else { document.getElementById('loginGeneralError').style.display = 'block'; setTimeout(()=>{document.getElementById('loginGeneralError').style.display='none';},2000); }
}
function doRegister() {
    let name = document.getElementById('regName').value, email = document.getElementById('regEmail').value, phone = document.getElementById('regPhone').value, bank = document.getElementById('regBank').value, pass = document.getElementById('regPass').value;
    if(!name || !email || !pass) return alert('შეავსეთ აუცილებელი ველები');
    if(users.find(u=>u.email===email)) return alert('მეილი არსებობს');
    users.push({ id: Date.now(), name, email, phone, bank, password: pass, role: "pending", status: "pending" });
    persist();
    alert('მოთხოვნა გაგზავნილია');
    document.getElementById('showLoginLink').click();
}
function logout() { currentUser = null; persist(); renderAll(); }
function renderAll() {
    let isAuth = !!currentUser;
    let isAdmin = isAuth && currentUser.role === 'admin';
    let isCourier = isAuth && currentUser.role === 'courier';
    let tabsBar = document.getElementById('tabsBar');

    if(isAuth) {
        tabsBar.classList.add('visible');

        document.querySelector('[data-tab="loginTab"]').style.display = 'none';
        document.querySelector('[data-tab="courierTab"]').style.display = isCourier ? 'inline-block' : 'none';
        document.querySelector('[data-tab="adminTab"]').style.display = isAdmin ? 'inline-block' : 'none';

        if(isCourier) switchTab('courierTab');
        else if(isAdmin) switchTab('adminTab');

        if(isCourier) {
            renderCourierProfile();
            initCourierMap();
        }

        if(isAdmin) {
            if(!adminMap) initAdminMap();
            refreshAdminPanel();
        }

    } else {
        tabsBar.classList.remove('visible');

        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('loginTab').classList.add('active');

        document.getElementById('loginFormWrapper').style.display = 'block';
        document.getElementById('registerFormWrapper').style.display = 'none';
    }
}

// 👉 EVENT LISTENERS
document.getElementById('doLoginBtn').onclick = doLogin;
document.getElementById('doRegisterBtn').onclick = doRegister;
document.getElementById('logoutBtn').onclick = logout;
document.getElementById('adminLogout').onclick = logout;

document.getElementById('showRegisterLink').onclick = () => {
    document.getElementById('loginFormWrapper').style.display = 'none';
    document.getElementById('registerFormWrapper').style.display = 'block';
};

document.getElementById('showLoginLink').onclick = () => {
    document.getElementById('registerFormWrapper').style.display = 'none';
    document.getElementById('loginFormWrapper').style.display = 'block';
};

document.getElementById('searchBtn').onclick = searchAddress;
document.getElementById('createOrderBtn').onclick = createOrder;

document.getElementById('adminMainBtn').onclick = () => setAdminSection('adminMainSection');
document.getElementById('adminOrdersListBtn').onclick = () => setAdminSection('adminOrdersListSection');
document.getElementById('adminCouriersBtn').onclick = () => setAdminSection('adminCouriersSection');
document.getElementById('adminStatsBtn').onclick = () => setAdminSection('adminStatsSection');
document.getElementById('adminRequestsBtn').onclick = () => setAdminSection('adminRequestsSection');

document.getElementById('searchOrderPhoneBtn').onclick = () => {
    let val = document.getElementById('searchOrderByPhone').value;
    renderAdminOrders(val);
};

document.getElementById('resetOrderListBtn').onclick = () => {
    document.getElementById('searchOrderByPhone').value = '';
    renderAdminOrders('');
};

// стартი
renderAll();
</script>

</body>
</html>
