<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8" />
<title>Courier FLAGS PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; overflow:hidden; }
#map { height:100vh; width:100vw; }

/* AUTH */
#authBox{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.authCard{
  width:320px;
  background:#1e1e1e;
  padding:20px;
  border-radius:10px;
  color:white;
}

.authCard input{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:5px;
}

.authCard button{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

#extraFields{ display:none; }

.smallText{
  text-align:center;
  font-size:12px;
  margin-top:10px;
  cursor:pointer;
}

/* MENU */
#menuBtn{
  position:absolute;
  top:15px;
  right:15px;
  z-index:2000;
  background:#111;
  color:white;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

#sidebar{
  position:fixed;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:#111;
  color:white;
  padding:15px;
  transition:0.3s;
  z-index:3000;
  overflow:auto;
}

#sidebar.open{ right:0; }

button{
  width:100%;
  padding:8px;
  margin-bottom:8px;
  background:green;
  color:white;
  border:none;
  cursor:pointer;
}

#overlay{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:2500;
}
#overlay.show{ display:block; }

.stats{
  background:#222;
  padding:10px;
  font-size:13px;
  margin-bottom:10px;
}

.order{
  background:#222;
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
  cursor:pointer;
}

.order:hover{ background:#333; }

input{
  width:100%;
  padding:8px;
  margin-bottom:8px;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<div id="authBox">
  <div class="authCard">

    <h3 id="authTitle">Login</h3>

    <input id="emailLogin" placeholder="მაილი">

    <div id="extraFields">
      <input id="fullName" placeholder="სახელი და გვარი">
      <input id="phone" placeholder="მობილური">
      <input id="verifyCode" placeholder="ვერიფიკაციის კოდი">
    </div>

    <input id="password" type="password" placeholder="პაროლი">

    <button onclick="authAction()">შესვლა / რეგისტრაცია</button>

    <div class="smallText" onclick="toggleAuth()">
      რეგისტრაცია / Login
    </div>

  </div>
</div>

<div id="menuBtn" onclick="toggleMenu()">☰</div>
<div id="overlay" onclick="closeMenu()"></div>

<div id="sidebar">
  <h3>📦 მენიუ</h3>

  <input id="searchBox" placeholder="🔍 ძებნა">
  <button onclick="searchAddress()">ძებნა</button>

  <button onclick="enableAddMode()">➕ დამატება</button>
  <button onclick="showHistory()">📊 ისტორია</button>
  <button onclick="closeDay()">📅 დღის დასრულება</button>

  <div class="stats">
    📦 სულ: <span id="total">0</span><br>
    🟢 მიტანილი: <span id="delivered">0</span><br>
    🔴 ვერ მიტანილი: <span id="failed">0</span>
  </div>

  <div id="ordersList"></div>
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([41.7151,44.8271],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; OpenStreetMap'
}).addTo(map);

let addMode = false;
let orders = [];

/* ================== FIXED HISTORY SYSTEM ================== */

function closeDay(){

  if(orders.length === 0){
    alert("📅 არაფერი არ არის დასახურავი");
    return;
  }

  const delivered = orders.filter(o => o.status === "delivered").length;
  const failed = orders.filter(o => o.status === "failed").length;

  const historyItem = {
    date: new Date().toLocaleDateString("ka-GE"),
    total: orders.length,
    delivered: delivered,
    failed: failed,
    orders: orders.map(o => ({
      name: o.name,
      phone: o.phone,
      status: o.status
    }))
  };

  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.push(historyItem);
  localStorage.setItem("history", JSON.stringify(history));

  orders.forEach(o=>{
    map.removeLayer(o.marker);
  });

  orders = [];
  updateStats();

  alert("📅 დღე დაიხურა და შეინახა ისტორიაში");
}

/* ================== HISTORY VIEW ================== */

function showHistory(){
  const history = JSON.parse(localStorage.getItem("history")) || [];

  if(history.length === 0){
    alert("📊 ისტორია ცარიელია");
    return;
  }

  let text = "📊 HISTORY\n\n";

  history.forEach((h, i)=>{
    text += `📅 დღე ${i+1}: ${h.date}\n`;
    text += `📦 სულ: ${h.total} | 🟢 ${h.delivered} | 🔴 ${h.failed}\n`;

    h.orders.forEach(o=>{
      text += `   - ${o.name} | ${o.phone} | ${o.status}\n`;
    });

    text += "\n";
  });

  alert(text);
}

/* ================== REST OF YOUR CODE (UNCHANGED) ================== */

let isLogin = true;
let currentUser = null;
let users = JSON.parse(localStorage.getItem("users")) || {};

function toggleAuth(){
  isLogin = !isLogin;
  document.getElementById("authTitle").innerText = isLogin ? "Login" : "Register";
  document.getElementById("extraFields").style.display = isLogin ? "none" : "block";
}

function authAction(){

  const email = emailLogin.value;
  const pass = password.value;

  if(isLogin){

    const user = Object.values(users).find(u => u.email === email && u.password === pass);

    if(user){
      document.getElementById("authBox").style.display = "none";
      currentUser = user;
    } else {
      alert("არასწორი მონაცემები");
    }

  } else {

    if(verifyCode.value !== "123123"){
      return alert("არასწორი კოდი");
    }

    const id = "u_" + Date.now();

    users[id] = {
      email,
      password: pass,
      fullName: fullName.value,
      phone: phone.value
    };

    localStorage.setItem("users", JSON.stringify(users));

    alert("რეგისტრაცია წარმატებულია");
    toggleAuth();
  }
}

function redFlag(){
  return L.divIcon({
    html:`<div style="width:14px;height:14px;background:red;border-radius:50%;border:2px solid darkred;"></div>`,
    iconSize:[16,16]
  });
}

function greenFlag(){
  return L.divIcon({
    html:`<div style="width:14px;height:14px;background:green;border-radius:50%;border:2px solid darkgreen;"></div>`,
    iconSize:[16,16]
  });
}

function failedFlag(){
  return L.divIcon({
    html:`<div style="width:14px;height:14px;background:orange;border-radius:50%;border:2px solid red;"></div>`,
    iconSize:[16,16]
  });
}

function carIcon(){
  return L.icon({
    iconUrl:"https://cdn-icons-png.flaticon.com/512/743/743920.png",
    iconSize:[35,35]
  });
}

let myMarker = null;
let watchId = null;

function startGPS(){
  if(watchId !== null) return;

  watchId = navigator.geolocation.watchPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    if(!myMarker){
      myMarker = L.marker([lat,lng],{icon:carIcon()}).addTo(map);
    } else {
      myMarker.setLatLng([lat,lng]);
    }
  });
}

window.onload = startGPS;

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

function closeMenu(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

function enableAddMode(){
  addMode = true;
  closeMenu();
  alert("დააჭირე რუკაზე");
}

map.on("click", e=>{
  if(!addMode) return;

  const name = prompt("სახელი:");
  const phone = prompt("ტელეფონი:");

  const marker = L.marker([e.latlng.lat,e.latlng.lng],{
    icon:redFlag()
  }).addTo(map);

  const order = {
    id: Date.now(),
    name,
    phone,
    status:"pending",
    marker
  };

  marker.bindPopup(`
    📦 ${name}<br>
    📞 ${phone}<br><br>
    <button onclick="deliver(${order.id})">✔ ჩაბარდა</button>
    <button onclick="fail(${order.id})">❌ ვერ ჩაბარდა</button>
  `);

  orders.push(order);
  addMode=false;
  updateStats();
});

function deliver(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  o.status="delivered";
  o.marker.setIcon(greenFlag());
  o.marker.closePopup();
  updateStats();
}

function fail(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  o.status="failed";
  o.marker.setIcon(failedFlag());
  o.marker.closePopup();
  updateStats();
}

function updateStats(){
  document.getElementById("total").innerText = orders.length;
  document.getElementById("delivered").innerText = orders.filter(o=>o.status==="delivered").length;
  document.getElementById("failed").innerText = orders.filter(o=>o.status==="failed").length;
  renderList();
}

function renderList(){
  const div = document.getElementById("ordersList");
  div.innerHTML="";

  orders.forEach(o=>{
    const el = document.createElement("div");
    el.className="order";

    el.innerHTML = `
      📦 ${o.name}<br>
      📞 ${o.phone}<br>
      ${o.status}
    `;

    el.onclick=()=>{
      map.setView(o.marker.getLatLng(),16);
      o.marker.openPopup();
    };

    div.appendChild(el);
  });
}

/* GLOBAL */
window.deliver=deliver;
window.fail=fail;
window.enableAddMode=enableAddMode;
window.toggleMenu=toggleMenu;
window.closeMenu=closeMenu;
window.showHistory=showHistory;
window.closeDay=closeDay;

</script>

</body>
</html>
