<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>საკურიერო მართვის სისტემა</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <main class="app-shell" aria-label="საკურიერო რუკა">
    <div id="map" class="map" aria-label="საკურიერო რუკა"></div>

    <button id="menuButton" class="icon-button menu-button" type="button" aria-label="მენიუს გახსნა" aria-expanded="false">
      <span aria-hidden="true">&#9776;</span>
    </button>

    <aside id="actionPanel" class="action-panel" aria-label="მენიუ"></aside>

    <div id="modeToast" class="mode-toast" role="status" hidden></div>

    <div id="courierStatsCard" class="courier-stats-card" role="status" hidden></div>

    <div id="nearestParcelCard" class="nearest-card" role="status" hidden></div>
  </main>

  <section id="setupModal" class="modal-overlay" aria-modal="true" role="dialog" aria-labelledby="setupTitle">
    <form id="setupForm" class="modal-card">
      <h1 id="setupTitle">ადმინის შექმნა</h1>
      <label for="setupUsername">ლოგინი</label>
      <input id="setupUsername" name="username" type="text" autocomplete="username" required>
      <label for="setupPassword">პაროლი</label>
      <input id="setupPassword" name="password" type="password" autocomplete="new-password" minlength="3" required>
      <button class="button primary" type="submit">ადმინის შექმნა</button>
      <p id="setupError" class="form-message" role="alert"></p>
    </form>
  </section>

  <section id="authModal" class="modal-overlay" aria-modal="true" role="dialog" aria-labelledby="authTitle">
    <form id="loginForm" class="modal-card">
      <h1 id="authTitle">სისტემაში შესვლა</h1>
      <label for="loginUsername">ლოგინი</label>
      <input id="loginUsername" name="username" type="text" autocomplete="username" required>
      <label for="loginPassword">პაროლი</label>
      <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
      <button class="button primary" type="submit">შესვლა</button>
      <p id="loginError" class="form-message" role="alert"></p>
    </form>
  </section>

  <section id="registerModal" class="modal-overlay" aria-modal="true" role="dialog" aria-labelledby="registerTitle">
    <form id="registerForm" class="modal-card">
      <h2 id="registerTitle">კურიერის რეგისტრაცია</h2>
      <label for="regUsername">ლოგინი</label>
      <input id="regUsername" name="username" type="text" autocomplete="username" required>
      <label for="regFirstName">სახელი</label>
      <input id="regFirstName" name="firstName" type="text" autocomplete="given-name" required>
      <label for="regLastName">გვარი</label>
      <input id="regLastName" name="lastName" type="text" autocomplete="family-name" required>
      <label for="regPhone">მობილურის ნომერი</label>
      <input id="regPhone" name="phone" type="tel" autocomplete="tel" required>
      <label for="regPassword">პაროლი</label>
      <input id="regPassword" name="password" type="password" autocomplete="new-password" minlength="3" required>
      <button class="button primary" type="submit">მოთხოვნის გაგზავნა</button>
      <button id="backToLoginButton" class="link-button" type="button">შესვლაზე დაბრუნება</button>
      <p id="regError" class="form-message" role="alert"></p>
    </form>
  </section>

  <section id="dialogModal" class="modal-overlay" aria-modal="true" role="dialog" aria-labelledby="dialogTitle">
    <div class="modal-card">
      <h2 id="dialogTitle"></h2>
      <div id="dialogBody" class="dialog-body"></div>
      <div id="dialogActions" class="dialog-actions"></div>
    </div>
  </section>
</body>
</html>
