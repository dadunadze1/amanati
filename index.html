<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Courier FLAGS PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    *{box-sizing:border-box}
    body{margin:0;overflow:hidden;font-family:Arial;background:#0f172a}
    #map{width:100vw;height:100vh}

    #authBox{
      position:fixed;inset:0;background:rgba(15,23,42,.88);
      z-index:9999;display:flex;align-items:center;justify-content:center;
    }

    .card{
      width:330px;background:#111827;padding:22px;border-radius:18px;color:white;
    }

    input,select,button{
      width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #334155;
    }

    button{background:#22c55e;font-weight:bold}

    #menuBtn{
      position:fixed;top:15px;right:15px;z-index:3000;display:none;
    }

    #sidebar{
      position:fixed;top:0;right:-320px;width:300px;height:100%;
      background:#111827;color:white;padding:20px;transition:.3s;
    }

    #sidebar.open{right:0}

    #panel{
      position:fixed;left:20px;bottom:20px;width:350px;
      background:white;padding:15px;border-radius:12px;display:none;
    }
  </style>
</head>

<body>

<div id="map"></div>

<section id="authBox">
  <div class="card">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">შესვლა</button>
    <p id="authMessage"></p>
  </div>
</section>

<button id="menuBtn" onclick="toggleMenu()">☰</button>

<div id="sidebar">
  <button onclick="logout()">გასვლა</button>
</div>

<div id="panel"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  addDoc,
  collection,
  getDocs,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBF421H4mkNB9Ve_uJ8Ph6z4LrbxzKlrC4",
  authDomain: "amanatebi123-43963.firebaseapp.com",
  projectId: "amanatebi123-43963",
  storageBucket: "amanatebi123-43963.firebasestorage.app",
  messagingSenderId: "882036563594",
  appId: "1:882036563594:web:c800b0f2bb6977a441d773"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const map = L.map("map").setView([41.7151,44.8271],12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let selectedLatLng = null;
let orderMarker = null;
let orderMarkers = [];

function showApp(){
  document.getElementById("authBox").style.display="none";
  document.getElementById("menuBtn").style.display="block";
}

function showLogin(){
  document.getElementById("authBox").style.display="flex";
}

window.login = async function(){
  const email = emailInput.value;
  const password = passwordInput.value;

  try{
    const cred = await signInWithEmailAndPassword(auth,email,password);
    const snap = await getDoc(doc(db,"users",cred.user.uid));

    if(snap.exists()){
      showApp();
      loadOrderMarkers();
    }
  }catch(e){
    authMessage.textContent = e.message;
  }
};

window.logout = async function(){
  await signOut(auth);
  location.reload();
};

window.toggleMenu = function(){
  sidebar.classList.toggle("open");
};

map.on("click", async function(e){
  selectedLatLng = e.latlng;

  if(orderMarker){
    map.removeLayer(orderMarker);
  }

  orderMarker = L.marker(selectedLatLng).addTo(map);

  const snap = await getDocs(collection(db,"couriers"));

  let options="";
  snap.forEach(d=>{
    const c=d.data();
    options+=`<option value="${d.id}|${c.name}">${c.name}</option>`;
  });

  panel.innerHTML=`
    <input id="oName" placeholder="სახელი">
    <input id="oPhone" placeholder="ტელეფონი">
    <input id="oAddress" placeholder="მისამართი">
    <select id="oCourier">${options}</select>
    <button onclick="saveOrder()">შენახვა</button>
  `;
  panel.style.display="block";
});

window.saveOrder = async function(){
  const [courierId,courierName]=oCourier.value.split("|");

  await addDoc(collection(db,"orders"),{
    clientName:oName.value,
    clientPhone:oPhone.value,
    address:oAddress.value,
    courierId,
    courierName,
    status:"pending",
    lat:selectedLatLng.lat,
    lng:selectedLatLng.lng,
    createdAt:serverTimestamp()
  });

  alert("დაემატა");
  panel.style.display="none";
  loadOrderMarkers();
};

async function loadOrderMarkers(){
  orderMarkers.forEach(m=>map.removeLayer(m));
  orderMarkers=[];

  const snap = await getDocs(collection(db,"orders"));

  snap.forEach(d=>{
    const o=d.data();

    const marker=L.marker([o.lat,o.lng]).addTo(map)
      .bindPopup(o.clientName);

    orderMarkers.push(marker);
  });
}

onAuthStateChanged(auth,user=>{
  if(user){
    showApp();
    loadOrderMarkers();
  }else{
    showLogin();
  }
});
</script>

</body>
</html>
