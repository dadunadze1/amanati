<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Courier FLAGS PRO</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { margin:0; }
    #map { height:100vh; }

    #authBox {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .card {
      background:#222;
      padding:20px;
      border-radius:10px;
      color:white;
      width:250px;
    }

    input, button {
      width:100%;
      margin-top:10px;
      padding:8px;
    }

    #menuBtn {
      position:absolute;
      top:10px;
      right:10px;
      background:black;
      color:white;
      padding:10px;
      cursor:pointer;
      display:none;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="authBox">
  <div class="card">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">შესვლა</button>
    <button onclick="register()">რეგისტრაცია</button>
  </div>
</div>

<div id="menuBtn">☰</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // MAP
  const map = L.map('map').setView([41.7151, 44.8271], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
</script>

<script type="module">
  import "./firebase.js";
  import "./auth.js";
</script>

</body>
</html>
