<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Courier FLAGS PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    body { margin:0; overflow:hidden; font-family:Arial; }
    #map { width:100vw; height:100vh; }

    #authBox {
      position:fixed;
      inset:0;
      background:rgba(10,15,25,.88);
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .auth-card {
      width:320px;
      background:#111827;
      color:white;
      padding:22px;
      border-radius:18px;
      box-shadow:0 20px 60px rgba(0,0,0,.4);
    }

    .auth-card h1 { font-size:24px; margin:0 0 5px; }
    .auth-card p { margin:0 0 15px; color:#cbd5e1; }

    input {
      width:100%;
      box-sizing:border-box;
      padding:12px;
      margin:7px 0;
      border-radius:10px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:8px;
      border:0;
      border-radius:10px;
      background:#22c55e;
      color:#052e16;
      font-weight:bold;
      cursor:pointer;
    }

    .register-btn { background:#38bdf8; color:#082f49; }

    #authMessage {
      color:#fbbf24;
      font-size:14px;
      margin-top:10px;
    }

    #menuBtn {
      position:fixed;
      top:15px;
      right:15px;
      z-index:3000;
      width:auto;
      padding:10px 14px;
      background:#111827;
      color:white;
      display:none;
    }

    #sidebar {
      position:fixed;
      top:0;
      right:-320px;
      width:280px;
      height:100vh;
      background:#111827;
      color:white;
      z-index:2500;
      padding:20px;
      transition:.3s;
    }

    #sidebar.open { right:0; }

    #panel {
      position:fixed;
      left:20px;
      bottom:20px;
      width:320px;
      min-height:120px;
      background:white;
      z-index:2500;
      padding:15px;
      border-radius:14px;
      display:none;
    }
  </style>
</head>

<body>

<div id="map"></div>

<section id="authBox">
  <div class="auth-card">
    <h1>🚚 Courier FLAGS PRO</h1>
    <p>Admin / Courier login</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">შესვლა</button>
    <button class="register-btn" onclick="register()">რეგისტრაცია</button>

    <div id="authMessage"></div>
  </div>
</section>

<button id="menuBtn" onclick="toggleMenu()">☰</button>

<aside id="sidebar">
  <h2>მენიუ</h2>
  <button onclick="showAdminPanel()">ადმინის პანელი</button>
  <button onclick="showCourierPanel()">კურიერის პანელი</button>
  <button onclick="openClients()">კლიენტები</button>
  <button onclick="openAnalytics()">ანალიტიკა</button>
  <button onclick="logout()">გასვლა</button>
</aside>

<div id="panel"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map("map").setView([41.7151, 44.8271], 12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
  }).addTo(map);

  window.toggleMenu = function () {
    document.getElementById("sidebar").classList.toggle("open");
  };

  function showPanel(title, text) {
    const panel = document.getElementById("panel");
    panel.innerHTML = `<h3>${title}</h3><p>${text}</p>`;
    panel.style.display = "block";
  }

  window.showAdminPanel = () => showPanel("ადმინის პანელი", "ადმინის ფუნქციები ჩაირთო.");
  window.showCourierPanel = () => showPanel("კურიერის პანელი", "კურიერის ფუნქციები ჩაირთო.");
  window.openClients = () => showPanel("კლიენტები", "აქ იქნება კლიენტების ბაზა.");
  window.openAnalytics = () => showPanel("ანალიტიკა", "აქ იქნება ანალიტიკა და ანგარიშები.");
</script>

<script type="module" src="./auth.js?v=20"></script>

</body>
</html>
